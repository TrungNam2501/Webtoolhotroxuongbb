{% extends 'base.html' %}

{% block title %}Kiểm tra tiêu chuẩn theo máy{% endblock %}

{% block content %}
<style>
    .appointment-container {
        max-width: 800px;
        margin: 30px auto;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #333;
        text-align: center;
    }
    .appointment-container h2 {
        font-size: 1.8rem;
        color: #0062ff;
        margin-bottom: 15px;
    }
    @media (max-width: 600px) {
        .appointment-container {
            padding: 15px;
            margin: 15px;
        }
        .appointment-container h2 {
            font-size: 1.4rem;
        }
    }
</style>

<div class="appointment-container">
    <h2>Hẹn ngày gần nhất để làm</h2>
</div>
{% endblock %}
