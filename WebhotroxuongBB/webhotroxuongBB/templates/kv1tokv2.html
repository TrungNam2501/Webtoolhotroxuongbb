{% extends 'base.html' %}
{% block title %}Tem kv1 to KV2 KD{% endblock %}
{% block content %}
<style>
    /* Reset và font chữ */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* Container chính */
    .data-container {
        max-width: 1200px;
        margin: 30px auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }
    /* Thanh tìm kiếm và tiêu đề */
    .table-header {
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(135deg, #7ce4cd1e, #4d5152ff);
        color: white;
        flex-wrap: wrap;
    }
    .table-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: black;
    }
    .printer-select {
        margin: 0 15px;
    }
    .printer-select select {
        padding: 10px 15px;
        border: none;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        outline: none;
        font-size: 0.9rem;
        cursor: pointer;
    }
    .printer-select select option {
        background: #333;
        color: white;
    }
    .search-box {
        position: relative;
        width: 300px;
        display: flex;
        align-items: center;
    }
    .search-box input {
        flex: 1;
        padding: 10px 15px 10px 40px;
        border: none;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        outline: none;
    }
    .search-box input::placeholder {
        color: rgba(255, 255, 255, 0.7);
    }
    .search-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: white;
    }
    .search-box button {
        padding: 10px 15px;
        border: none;
        border-radius: 30px;
        background: #0062ff;
        color: white;
        cursor: pointer;
        font-size: 0.9rem;
        margin-left: 10px;
        transition: background 0.3s;
    }
    .search-box button:hover {
        background: #0050d1;
    }
    /* Bảng dữ liệu */
    .data-table {
        width: 100%;
        border-collapse: collapse;
    }
    .data-table thead th {
        background-color: #f1f1f1;
        color: #333;
        font-weight: 600;
        padding: 15px;
        text-align: left;
        border-bottom: 2px solid #ddd;
    }
    .data-table tbody tr {
        border-bottom: 1px solid #eee;
        transition: all 0.3s ease;
    }
    .data-table tbody tr:hover {
        background-color: #f9f9f9;
        transform: translateX(5px);
    }
    .data-table tbody td {
        padding: 15px;
    }
    /* Status colors */
    .status {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 500;
    }
    .status.active {
        background: #e3f5ef;
        color: #00b894;
    }
    .status.pending {
        background: #fff4e5;
        color: #f39c12;
    }
    .status.inactive {
        background: #ffecea;
        color: #e74c3c;
    }
    /* Pagination */
    .pagination {
        display: flex;
        justify-content: center;
        padding: 20px;
        list-style: none;
    }
    .pagination li {
        margin: 0 5px;
    }
    .pagination a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: #333;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s;
    }
    .pagination a:hover,
    .pagination a.active {
        background: #0062ff;
        color: white;
    }
    /* Responsive */
    @media (max-width: 768px) {
        .table-header {
            flex-direction: column;
            align-items: flex-start;
        }
        .printer-select, .search-box {
            width: 100%;
            margin-top: 15px;
        }
        .printer-select select {
            width: 100%;
            border-radius: 30px;
        }
        .search-box input {
            border-radius: 30px;
        }
        .search-box button {
            border-radius: 30px;
        }
        .data-table {
            display: block;
            overflow-x: auto;
        }
    }
    /* No results message */
    .no-results {
        text-align: center;
        padding: 20px;
        color: #e74c3c;
        font-weight: 500;
    }
       /* Alert styles */
    .alert {
        padding: 12px 20px;
        margin: 10px 0;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 500;
    }
    .alert-success {
        background: #e6ffed;
        color: #2d8a4e;
        border: 1px solid #b2f2bb;
    }
    .alert-error, .alert-danger {
        background: #ffecec;
        color: #d63031;
        border: 1px solid #fab1a0;
    }
    .alert-warning {
        background: #fff4e6;
        color: #e67e22;
        border: 1px solid #ffcc80;
    }
    .alert-info {
        background: #eaf4ff;
        color: #0984e3;
        border: 1px solid #74b9ff;
    }
</style>

<div class="data-container">
    <div class="table-header">
        <div class="table-title">Tem kv1 to KV2</div>
        <div class="search-box">
            <span class="search-icon">📥</span>
            <form method="get" id="search-form">
                <input type="text" name="barcode" placeholder="Nhập mã vạch chuyển ..." value="{{ query }}">
                <button type="submit">Chuyển</button>
            </form>
        </div>
    </div>

     <!-- Hiển thị thông báo -->
    <div style="padding: 15px;">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>
   
</div>
<script>
    const searchInput = document.querySelector('.search-box input');
    const searchForm = document.querySelector('#search-form');

    // Allow form submission with Enter key
    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchForm.submit();
        }
    });

    // Trigger form submission on button click
    const searchButton = document.querySelector('.search-box button');
    searchButton.addEventListener('click', function() {
        searchForm.submit();
    });

   
</script>
    

{% endblock %}
